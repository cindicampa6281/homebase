<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeBase | Dashboard</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .jobs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .job-card {
      padding: 24px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .job-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      border-color: rgba(255,255,255,0.2);
    }

    .job-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .job-company {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .job-salary {
      font-weight: 700;
      color: var(--primary);
      font-size: 1.1rem;
      margin-bottom: 15px;
    }

    .job-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid var(--border-glass);
    }

    .job-status {
      font-size: 0.8rem;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(52, 199, 89, 0.2);
      color: var(--success);
      font-weight: 600;
    }

    /* Modal Styling */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(5px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      width: 90%;
      max-width: 500px;
      padding: 30px;
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-content {
      transform: translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .form-row {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
    }
    .form-row .form-group {
      flex: 1;
      margin-bottom: 0;
    }

    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.8);
    }
    textarea.glass-input {
      resize: vertical;
      min-height: 80px;
    }
  </style>
  <script type="module" crossorigin src="/assets/dashboard-8An3LdLC.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
</head>
<body>
  <div id="alert-container"></div>

  <div class="container animate-fade-in">
    <div class="navbar">
      <h1>HomeBase</h1>
      <div style="display: flex; gap: 15px;">
        <button id="btn-open-create" class="btn-primary" style="width: auto; padding: 10px 20px;">+ Đăng Việc Mới</button>
        <button id="btn-logout" class="glass-input" style="width: auto; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; background: transparent;">Đăng xuất</button>
      </div>
    </div>

    <div>
      <h2 style="margin-bottom: 10px;">Khám phá công việc</h2>
      <p style="color: var(--text-secondary);">Hàng ngàn cơ hội đang chờ đón bạn.</p>
    </div>

    <div id="jobs-container" class="jobs-grid">
      <!-- Jobs will be rendered here by JS -->
      <div style="text-align: center; grid-column: 1 / -1; padding: 40px; color: var(--text-secondary);">
        Đang tải công việc...
      </div>
    </div>
  </div>

  <!-- Create Job Modal -->
  <div class="modal-overlay" id="create-modal">
    <div class="glass-panel modal-content">
      <div class="modal-header">
        <h2>Đăng Việc Mới</h2>
        <button class="close-btn" id="btn-close-modal">&times;</button>
      </div>
      <form id="create-job-form">
        <div class="form-group">
          <label>Tên công việc</label>
          <input type="text" id="job-title" class="glass-input" required placeholder="VD: Nhân viên phục vụ quán Cafe" />
        </div>
        <div class="form-group">
          <label>Tên cửa hàng / Công ty</label>
          <input type="text" id="job-employer" class="glass-input" required placeholder="VD: The Coffee House" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Mức lương</label>
            <input type="text" id="job-pay" class="glass-input" required placeholder="VD: 25.000đ/giờ" />
          </div>
          <div class="form-group">
            <label>Số người cần</label>
            <input type="number" id="job-workers" class="glass-input" required min="1" value="1" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Bắt đầu (Date & Time)</label>
            <input type="datetime-local" id="job-start" class="glass-input" required />
          </div>
          <div class="form-group">
            <label>Kết thúc (Date & Time)</label>
            <input type="datetime-local" id="job-end" class="glass-input" required />
          </div>
        </div>
        <div class="form-group">
          <label>Địa điểm</label>
          <input type="text" id="job-location" class="glass-input" required placeholder="VD: Quận 1, TP.HCM" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Số điện thoại liên hệ</label>
            <input type="tel" id="job-phone" class="glass-input" required placeholder="VD: 0901234567" />
          </div>
          <div class="form-group">
            <label>Email liên hệ</label>
            <input type="email" id="job-email" class="glass-input" placeholder="VD: contact@abc.com" />
          </div>
        </div>
        <button type="submit" class="btn-primary" id="btn-submit-job">Đăng Ngay</button>
      </form>
    </div>
  </div>
  
  <!-- Applicants Modal -->
  <div class="modal-overlay" id="applicants-modal">
    <div class="glass-panel modal-content" style="max-height: 80vh; display: flex; flex-direction: column;">
      <div class="modal-header">
        <h2>Danh Sách Ứng Viên</h2>
        <button class="close-btn" id="btn-close-applicants-modal">&times;</button>
      </div>
      <div id="applicants-list" style="overflow-y: auto; flex: 1;">
        <!-- Applicants rendered here -->
        <div style="text-align: center; color: var(--text-secondary); padding: 20px;">Đang tải...</div>
      </div>
    </div>
  </div>

</body>
</html>
